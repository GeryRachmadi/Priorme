<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priorme - Smart To-Do Calendar</title>
    <link rel="icon" href="image/priorme-logo.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="sidebar-brand">
                <img src="image/priorme-logo.png" alt="" class="brand-logo" onerror="this.style.display='none'">
                <span class="brand-icon-fb" id="brandIconFb" style="display:none"><i class="fas fa-layer-group"></i></span>
                <span class="brand-name">Priorme</span>
            </div>
            <button class="sidebar-close-btn" onclick="closeSidebar()"><i class="fas fa-times"></i></button>
        </div>

        <button class="sidebar-add-btn" onclick="openPopup(); closeSidebar()">
            <i class="fas fa-plus"></i> <span>New Task</span>
        </button>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <p class="nav-label">Views</p>
            <button class="nav-btn" data-view="day"   onclick="switchMainView('day');   closeSidebar()"><i class="fas fa-calendar-day"></i>           <span>Day</span></button>
            <button class="nav-btn active"        data-view="week"  onclick="switchMainView('week');  closeSidebar()"><i class="fas fa-calendar-week"></i>  <span>Week</span></button>
            <button class="nav-btn"        data-view="month" onclick="switchMainView('month'); closeSidebar()"><i class="fas fa-calendar-alt"></i>   <span>Month</span></button>
            <button class="nav-btn"        data-view="list"  onclick="switchMainView('list');  closeSidebar()"><i class="fas fa-list-ul"></i>        <span>List</span></button>
        </nav>

        <div class="sidebar-divider"></div>

        <nav class="sidebar-nav">
            <p class="nav-label">Filter</p>
            <button class="nav-btn filter-btn active" data-filter="all"       onclick="setFilter('all');       closeSidebar()"><i class="fas fa-inbox"></i>              <span>All Tasks</span></button>
            <button class="nav-btn filter-btn"        data-filter="active"    onclick="setFilter('active');    closeSidebar()"><i class="fas fa-circle-half-stroke"></i> <span>Ongoing</span></button>
            <button class="nav-btn filter-btn"        data-filter="completed" onclick="setFilter('completed'); closeSidebar()"><i class="fas fa-check-circle"></i>       <span>Completed</span></button>
        </nav>

        <div class="sidebar-divider"></div>

        <div class="priority-legend">
            <p class="nav-label">Priority</p>
            <div class="legend-item"><span class="dot p-someday"></span>   <span>Someday</span></div>
            <div class="legend-item"><span class="dot p-nice"></span>      <span>Nice to Have</span></div>
            <div class="legend-item"><span class="dot p-normal"></span>    <span>Normal</span></div>
            <div class="legend-item"><span class="dot p-important"></span> <span>Important</span></div>
            <div class="legend-item"><span class="dot p-urgent"></span>    <span>URGENT!</span></div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="topbar-left">
                <button class="hamburger-btn" onclick="openSidebar()" aria-label="Menu"><i class="fas fa-bars"></i></button>
                <button class="nav-arrow" onclick="navigatePrev()"><i class="fas fa-chevron-left"></i></button>
                <button class="nav-arrow" onclick="navigateNext()"><i class="fas fa-chevron-right"></i></button>
                <button class="today-btn" onclick="goToToday()">Today</button>
                <h2 class="topbar-title" id="topbarTitle"></h2>
            </div>
            <div class="topbar-right">
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle light/dark mode"><i class="fas fa-moon" id="themeIcon"></i></button>
                <button class="view-toggle-btn" data-v="day"   onclick="switchMainView('day')">  <i class="fas fa-calendar-day"></i>          <span>Day</span></button>
                <button class="view-toggle-btn" data-v="week"  onclick="switchMainView('week')"> <i class="fas fa-calendar-week"></i> <span>Week</span></button>
                <button class="view-toggle-btn" data-v="month" onclick="switchMainView('month')"><i class="fas fa-calendar-alt"></i>  <span>Month</span></button>
                <button class="view-toggle-btn" data-v="list"  onclick="switchMainView('list')"> <i class="fas fa-list-ul"></i>       <span>List</span></button>
            </div>
        </div>

        <!-- DAY VIEW -->
        <div id="view-day" class="view-panel active">
            <div class="day-view-header" id="dayViewHeader"></div>
            <div class="day-timeline" id="dayTimeline"></div>
        </div>

        <!-- WEEK VIEW -->
        <div id="view-week" class="view-panel">
            <div class="week-wrapper">
                <div class="week-scroll" id="weekScroll">
                    <div class="week-header-row" id="weekHeaderRow"></div>
                    <div class="week-grid" id="weekGrid"></div>
                </div>
            </div>
        </div>

        <!-- MONTH VIEW -->
        <div id="view-month" class="view-panel">
            <div class="month-dow-row" id="monthDowRow"></div>
            <div class="month-grid" id="monthGrid"></div>
        </div>

        <!-- LIST VIEW -->
        <div id="view-list" class="view-panel">
            <div class="list-toolbar">
                <div class="sort-group">
                    <span class="sort-group-label">Sort by:</span>
                    <div class="sort-btn-group">
                        <button class="sort-seg active" data-sort-key="date" onclick="setSortKey('date')">
                            <i class="fas fa-calendar sort-dir-icon" id="icon-date"></i> Deadline
                        </button>
                        <button class="sort-seg" data-sort-key="name" onclick="setSortKey('name')">
                            <i class="fas fa-arrow-down-a-z sort-dir-icon" id="icon-name"></i> Name
                        </button>
                        <button class="sort-seg" data-sort-key="priority" onclick="setSortKey('priority')">
                            <i class="fas fa-flag sort-dir-icon" id="icon-priority"></i> Priority
                        </button>
                    </div>
                </div>
            </div>
            <div class="list-empty" id="listEmpty">
                <i class="fas fa-clipboard-list"></i>
                <p>No tasks here. Add one!</p>
            </div>
            <ul class="task-list" id="taskList"></ul>
        </div>

    </main>
</div>

<!-- ADD / EDIT MODAL -->
<div id="taskPopup" class="popup" role="dialog" aria-modal="true">
    <div class="popup-content">
        <div class="popup-header">
            <h3 id="popupTitle">New</h3>
            <button class="close-btn" onclick="closePopup()"><i class="fas fa-times"></i></button>
        </div>

        <!-- Type Toggle (hidden when editing) -->
        <div class="type-toggle" id="typeToggle">
            <button type="button" class="type-btn active" id="typeBtnTask" onclick="selectType('task')">
                <i class="fas fa-check-square"></i> Task
            </button>
            <button type="button" class="type-btn" id="typeBtnEvent" onclick="selectType('event')">
                <i class="fas fa-calendar-dot"></i> Event
            </button>
        </div>
        <input type="hidden" id="itemType" value="task">

        <form id="taskForm" onsubmit="handleFormSubmit(event)">
            <input type="hidden" id="taskId">

            <!-- Name -->
            <div class="form-group">
                <label for="taskName" id="labelName">Task Name</label>
                <input type="text" id="taskName" class="form-control" placeholder="What needs to be done?" autocomplete="off">
                <p class="error-msg" id="nameError">Name cannot be empty.</p>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="taskDueDate" id="labelDate">Deadline Date</label>
                <input type="date" id="taskDueDate" class="form-control">
            </div>

            <!-- TASK: single deadline time (optional) -->
            <div class="form-group" id="taskTimeGroup">
                <label for="taskDeadlineTime">Deadline Time <span class="optional-tag">optional</span></label>
                <input type="time" id="taskDeadlineTime" class="form-control">
            </div>

            <!-- EVENT: start + end time (required) -->
            <div class="form-row two-col" id="eventTimeGroup" style="display:none">
                <div class="form-group">
                    <label for="taskStartTime">Start Time</label>
                    <input type="time" id="taskStartTime" class="form-control">
                    <p class="error-msg" id="startTimeError">Start time required.</p>
                </div>
                <div class="form-group">
                    <label for="taskEndTime">End Time</label>
                    <input type="time" id="taskEndTime" class="form-control">
                    <p class="error-msg" id="endTimeError">End time required.</p>
                </div>
            </div>

            <!-- Location (event only) -->
            <div class="form-group" id="locationGroup" style="display:none">
                <label for="taskLocation">Location <span class="optional-tag">optional</span></label>
                <input type="text" id="taskLocation" class="form-control" placeholder="Where is this happening?" autocomplete="off">
            </div>

            <!-- Description (both) -->
            <div class="form-group">
                <label for="taskDesc">Description <span class="optional-tag">optional</span></label>
                <textarea id="taskDesc" class="form-control form-textarea" placeholder="Add notes or details..."></textarea>
            </div>

            <!-- Priority -->
            <div class="form-group">
                <label>Priority</label>
                <div class="priority-picker">
                    <button type="button" class="prio-opt p-someday"       data-priority="someday"   onclick="selectPriority('someday')">Someday</button>
                    <button type="button" class="prio-opt p-nice"          data-priority="nice"      onclick="selectPriority('nice')">Nice to Have</button>
                    <button type="button" class="prio-opt p-normal active"  data-priority="normal"   onclick="selectPriority('normal')">Normal</button>
                    <button type="button" class="prio-opt p-important"     data-priority="important" onclick="selectPriority('important')">Important</button>
                    <button type="button" class="prio-opt p-urgent"        data-priority="urgent"    onclick="selectPriority('urgent')">URGENT!</button>
                </div>
                <input type="hidden" id="taskPriority" value="normal">
            </div>

            <div class="form-row two-col">
                <button type="submit" class="btn btn-save">Save</button>
                <button type="button" class="btn btn-cancel" onclick="closePopup()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- TASK DETAIL POPUP -->
<div id="taskDetail" class="popup">
    <div class="popup-content detail-content">
        <div class="popup-header">
            <h3 id="detailTitle">Task Details</h3>
            <button class="close-btn" onclick="closeDetail()"><i class="fas fa-times"></i></button>
        </div>
        <div id="detailBody"></div>
        <div class="detail-actions">
            <button class="btn btn-save"   onclick="editFromDetail()"><i class="fas fa-pen"></i> Edit</button>
            <button class="btn btn-danger" onclick="deleteFromDetail()"><i class="fas fa-trash"></i> Delete</button>
        </div>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
